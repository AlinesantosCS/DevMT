<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700&display=swap" rel="stylesheet" />

    <!-- Bootstrap  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous" />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css" />
    <title>Dados Empresa </title>
</head>

<body>
    <!--Cabeçalho-->
    <header>
        <div class="pos-f-t">
            <nav class="navbar navbar-dark cor-padrao px-3">
                <img src="../img/logo.png" style="width: 5%" />
                <button class="navbar-toggler mx-3 py-1" type="button" data-toggle="collapse"
                    data-target="#navbarToggleExternalContent" aria-controls="navbarToggleExternalContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon  text-right"></span>
                </button>
            </nav>
        </div>
    </header>
    <!--Centro-->
    <main>
        <div class="col-lg-10 container form-group ">
            <h1 class="text-center my-4 texto-cor h1 "><strong>SEJA BEM-VINDA </strong> </h1>
            <div class="col-lg-12 shadow p-3 mb-5 bg-form rounded sticky-center ">
                <form action="" method="POST" id="login">
                    <div class="form-row my-4">
                        <div class="col-lg-10 pt-2 mx-auto">
                            <span class="texto-cor h5">LOCALIZAÇÃO</span>
                            <hr size="2">
                        </div>
                    </div>
                    <div class="row justify-content-center">
                        <div class="col-3 ">
                            <span class="texto-cor h6">Estado*</span>
                            <select name="estado" class="form-control form-control-md ">
                                <option selected="" value="">Selecione o Estado (UF)</option>
                                <option value="Acre">Acre</option>
                                <option value="Alagoas">Alagoas</option>
                                <option value="Amapá">Amapá</option>
                                <option value="Amazonas">Amazonas</option>
                                <option value="Bahia">Bahia</option>
                                <option value="Ceará">Ceará</option>
                                <option value="Distrito Federal">Distrito Federal</option>
                                <option value="Espírito Santo">Espírito Santo</option>
                                <option value="Goiás">Goiás</option>
                                <option value="Maranhão">Maranhão</option>
                                <option value="Mato Grosso">Mato Grosso</option>
                                <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
                                <option value="Minas Gerais">Minas Gerais</option>
                                <option value="Pará">Pará</option>
                                <option value="Paraíba">Paraíba</option>
                                <option value="Paraná">Paraná</option>
                                <option value="Pernambuco">Pernambuco</option>
                                <option value="Piauí">Piauí</option>
                                <option value="Rio de Janeiro">Rio de Janeiro</option>
                                <option value="Rio Grande do Sul">Rio Grande do Sul</option>
                                <option value="Rio Grande do Norte">Rio Grande do Norte</option>
                                <option value="Rondônia">Rondônia</option>
                                <option value="Roraima">Roraima</option>
                                <option value="Santa Catarina">Santa Catarina</option>
                                <option value="São Paulo">São Paulo</option>
                                <option value="Sergipe">Sergipe</option>
                                <option value="Tocantins">Tocantins</option>
                            </select>
                        </div>
                        <div class="col-3 ">
                            <span class="texto-cor h6">Cidade*</span>
                            <input type="text" class="form-control form-control-md" name="text">
                        </div>
                        <div class="col-4 ">
                            <span class="texto-cor h6">Lorgadouro*</span>
                            <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                type="text    " />
                        </div>

                    </div>
                    <div class="row justify-content-center">
                        <div class="col-3">
                            <span class="texto-cor h6">Bairro*</span>
                            <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                type="text    " />
                        </div>
                        <div class="col-1  ">
                            <span class="texto-cor h6">Numero*</span>
                            <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                type="text    " />
                        </div>
                        <div class="col-4  ">
                            <span class="texto-cor h6">Complemento</span>
                            <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                type="text    " />
                        </div>
                        <div class="col-2  ">
                            <span class="texto-cor h6">CEP*</span>
                            <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                type="number    " />
                        </div>
                    </div>
                    <div class="col-lg-10 pt-3 mx-auto py-4">
                        <span class="texto-cor h5">Dados Pessoais</span>
                        <hr size="2">
                    </div>
                    <div class=" row justify-content-center ">
                        <div class="col-3">
                            <span class="texto-cor h6">Nome*</span>
                            <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                type="text    " />
                        </div>
                        <div class="col-4">
                            <span class="texto-cor h6">Sobrenome*</span>
                            <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                type="text    " />
                        </div>
                       
                         <div class="col-3">
                             <span class="texto-cor h6">Identidade de gênero*</span>
                             <select class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                 type="select    ">
                                 <option value="Selecione">Selecione</option>
                                 <option value="Transgênero">Transgênero</option>
                                 <option value="Queer">Queer</option>
                                 <option value="Travesti">Travesti</option>
                                 <option value="Transexual">Transexual</option>
                                 <option value="Intersexo">Intersexo</option>
                                 <option value="Não binário">Não binário</option>
                                 <option value="Binário">Binário</option>
                                 <option value="Drag">Drag</option>
                                 <option value="null">Prefiro não dizer</option>

                             </select>
                         </div>
                    </div>
                    <div class=" row justify-content-center col-lg-8">
                         <div class="col-6">
                             <span class="texto-cor h6">Nome Social</span>
                             <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                 type="text    " />
                         </div>
                        <div class="col-3">
                            <span class="texto-cor h6">Data de Nascimento*</span>
                            <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                value="dd/mm/aa" type="date" />
                        </div>
                    </div>
                     <div class="row justify-content-center col-12 ">
                         <div class="col-4">
                             <span class="texto-cor h6">CPF*</span>
                             <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                 type="text    " />
                         </div>
                         <div class="col-4">
                             <span class="texto-cor h6">RG*</span>
                             <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                type="text" />                            
                         </div>
                         <div class="col-2 ">
                               <span class="texto-cor h6">Orgão emissor*</span>
                               <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                   type="text" />
                         </div>
                     </div>
                     <div class="col-lg-10 pt-3 mx-auto py-4">
                         <span class="texto-cor h5">Formação</span>
                         <hr size="2">
                     </div>
                     <div class=" row justify-content-center ">
                         <div class="col-7">
                             <span class="texto-cor h6">Curso*</span>
                             <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                 type="text    " />
                         </div>
                         <div class="col-3">
                             <span class="texto-cor h6">Grau acadêmico*</span>
                             <select class="form-control form-control-md " id="pass" name="pass" onkeypress="">
                                 <option value="Selecione">Selecione</option>
                            <option value="Bacharelado">Bacharelado</option>
                            <option value="Licenciatura">Licenciatura</option>
                            <option value="Tecnólogo"></option>
                            <option value="MBA">MBA</option>
                            <option value="Mestrado"></option>
                            <option value="Doutorado">Doutorado</option>
                            <option value="Pós-doutorado">Pós-doutorado</option>
                            <option value="Médio">Médio</option>
                            <option value="Fundamental">Fundamental</option>
                            </select>
                         </div>
                     </div>
                     <div class="row justify-content-center">
                         <div class="col-4  ">
                             <span class="texto-cor h6">Instituição*</span>
                             <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                 type="text    " />
                         </div>
                         <div class="col-3">
                             <span class="texto-cor h6">Duração*</span>
                             <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                 type="text" />
                         </div>
                         <div class="col-3 ">
                             <span class="texto-cor h6">Conclusão*</span>
                             <input class="form-control form-control-md " id="pass" name="pass" onkeypress=""
                                 type="text" />
                         </div>
                     </div>


                    <div class="col-12">
                        <div class="row justify-content-center mt-5 ">
                            <div class="col-lg-4 my-2 justify-content-center ">
                                <input class="form-control form-control-lg col-lg-5 py-auto btn btn-padrao " name="text"
                                    type="submit" value="Cadastrar" />
                            </div>
                        </div>
                    </div>
            </div>
            </form>
        </div>
        </div>
    </main>
    <!--- Rodapé -->
    <footer class="py-0 mx-0 my-0">
        <nav class="cor-padrao">
            <ul class="navbar navbar-expand-lg  ">
                <div class=" row justify-content-center">
                    <div class="col-2">
                        <a class="nav-link" href="https://facebook.com" target="_blank"><img src="../img/facebook.png"
                                alt="Logo facebook" class="logo-img"></a>
                    </div>

                    <div class="col-2">
                        <a class="nav-link" href="https://www.linkedin.com/" target="_blank"><img
                                src="../img/linkedin.png" class="logo-img" alt="Logo do Linkedin"></a>
                    </div>
                    <div class="col-2">
                        <a class="nav-link" href="https://instagram.com" target="_blank"><img src="../img/instagram.png"
                                class="logo-img" alt="Logo Instagram"></a>
                    </div>
                    <div class="col-2">

                        <a class="nav-link" href="https://gmail.com" target="_blank"><img src="../img/gmail.png"
                                class="logo-img" alt="Logo Gmail Instagram"></a>
                    </div>
                </div>
            </ul>
        </nav>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.6.0/dist/umd/popper.min.js"
        integrity="sha384-KsvD1yqQ1/1+IA7gi3P0tyJcT3vR+NdBTt13hSJ2lnve8agRGXTTyNaBYmCR/Nwi" crossorigin="anonymous">
    </script>

    <!-- Bootstrap  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.min.js"
        integrity="sha384-nsg8ua9HAw1y0W1btsyWgBklPnCUAFLuTMS2G72MMONqmOymq585AcH49TLBQObG" crossorigin="anonymous">
    </script>

    <!-- Bootstrap  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous">
    </script>
</body>

</html>
